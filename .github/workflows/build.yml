name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 v1.0.2)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate Gradle Wrapper
        run: |
          cd /tmp
          mkdir -p gradle-gen && cd gradle-gen
          echo 'rootProject.name = "temp"' > settings.gradle
          gradle wrapper --gradle-version 8.2
          cd "$GITHUB_WORKSPACE"
          mkdir -p gradle/wrapper
          cp /tmp/gradle-gen/gradlew /tmp/gradle-gen/gradlew.bat .
          cp /tmp/gradle-gen/gradle/wrapper/gradle-wrapper.jar /tmp/gradle-gen/gradle/wrapper/gradle-wrapper.properties gradle/wrapper/
          chmod +x gradlew
          rm -rf /tmp/gradle-gen

      - name: Update version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            TAG_VERSION="${{ github.event.inputs.version }}"
          else
            TAG_VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$TAG_VERSION" >> $GITHUB_OUTPUT
          VERSION="${TAG_VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # 计算 versionCode
          IFS='.' read -ra PARTS <<< "$VERSION"
          VERSION_CODE=0
          for i in "${!PARTS[@]}"; do
            MULT=$((10 ** (6 - i * 3)))
            VERSION_CODE=$((VERSION_CODE + PARTS[i] * MULT))
          done

          # 更新 build.gradle.kts
          sed -i "s/versionCode = [0-9]*/versionCode = $VERSION_CODE/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"$VERSION\"/" app/build.gradle.kts

          echo "Updated to $TAG_VERSION (versionCode: $VERSION_CODE)"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        run: ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release
          cp app/build/outputs/apk/release/app-release-unsigned.apk "release/Mirage-v${VERSION}-release.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Mirage ${{ steps.version.outputs.tag }}
          body: |
            ## Mirage ${{ steps.version.outputs.version }}

            ### 功能
            - 微信朋友圈净化（隐藏广告、推荐流）
            - 联系人列表增强
            - 会话消息管理
            - 群成员增强
            - 通知栏优化
            - 搜索增强
            - 标签管理

            ### 安装
            - 需要 Xposed 框架 (LSPosed / LSPatch)
            - 下载 APK 安装后，在 Xposed 管理器中启用模块
            - 重启微信生效

            ### 变更
            详见 [CHANGELOG.md](CHANGELOG.md)
          files: release/*.apk
          draft: false
          prerelease: false